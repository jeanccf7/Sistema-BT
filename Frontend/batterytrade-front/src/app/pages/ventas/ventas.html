<ng-container *ngIf="ventas$ | async as ventas">

    <ng-container *ngIf="filtrar(ventas) as lista">

        <div class="ventas-container">

            <div class="header">

                <div>
                    <h1>Ventas</h1>
                    <p>{{ lista.length }} ventas registradas</p>
                </div>

                <button class="btn-agregar" (click)="abrirFormulario()">
                    + Nueva Venta
                </button>
            </div>
            <div class="buscador">
                <input type="text" placeholder="Buscar cliente, pago o entrega..." [(ngModel)]="busqueda">
            </div>
            <div class="tabla-container">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Cliente</th>
                            <th>Total</th>
                            <th>Pago</th>
                            <th>Entrega</th>
                            <th>Método</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let venta of lista">

                            <td>{{ venta.fecha }}</td>
                            <td>
                                <strong>
                                    {{ venta.nombreCliente }}
                                </strong>
                            </td>
                            <td>
                                S/ {{ venta.total }}
                            </td>
                            <td>
                                <span class="badge" [ngClass]="
                venta.estadoPago === 'PAGADO'
                ? 'badge-success'
                : 'badge-warning'
              ">
                                    {{ venta.estadoPago }}

                                </span>
                            </td>
                            <td>
                                <span class="badge" [ngClass]="
                venta.estadoEntrega === 'ENTREGADO'
                ? 'badge-success'
                : 'badge-danger'
              ">
                                    {{ venta.estadoEntrega }}
                                </span>
                            </td>
                            <td>
                                {{ venta.metodoPago }}
                            </td>
                            <td>
                                
                                <button class="btn-eliminar" (click)="eliminarVenta(venta.id)">
                                    Eliminar
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </ng-container>

</ng-container>
<div class="modal-backdrop" *ngIf="mostrarFormulario">
    <div class="modal">
        <h2>Nueva Venta</h2>
        <select [(ngModel)]="nuevaVenta.clienteId">
            <option [value]="0">
                Seleccione cliente
            </option>
            <option *ngFor="let cliente of clientes" [value]="cliente.id">
                {{ cliente.nombre }}
            </option>
        </select>
        <select [(ngModel)]="nuevaVenta.metodoPago">
            <option value="EFECTIVO">
                Efectivo
            </option>
            <option value="YAPE">
                Yape
            </option>
            <option value="PLIN">
                Plin
            </option>
            <option value="TRANSFERENCIA">
                Transferencia
            </option>
        </select>
        <select [(ngModel)]="nuevaVenta.estadoPago">
            <option value="PENDIENTE">
                Pendiente
            </option>
            <option value="PAGADO">
                Pagado
            </option>
        </select>
        <select [(ngModel)]="nuevaVenta.estadoEntrega">
            <option value="PENDIENTE">
                Pendiente
            </option>
            <option value="ENTREGADO">
                Entregado
            </option>
        </select>
        <div class="acciones">
            <button class="btn-cancelar" (click)="cerrarFormulario()">
                Cancelar
            </button>
            <button class="btn-guardar" (click)="guardarVenta()">
                Guardar
            </button>
        </div>
    </div>
</div>
